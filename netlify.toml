[build]
  publish = "site"
  command = "pip install -r docs/requirements.txt && mkdocs build"

[build.processing]
  skip_processing = false

[build]
  # Dit script controleert of er relevante wijzigingen zijn.
  # Als de exit code 0 is, wordt de build geannuleerd.
  # Als de exit code 1 is, gaat de build door.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- docs/ mkdocs.yml"